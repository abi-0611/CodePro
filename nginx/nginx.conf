worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Performance ──────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_max_body_size 10m;

    # ── Gzip ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript
        application/xml application/xml+rss
        image/svg+xml;

    # ── Logging ──────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Rate Limiting Zones ──────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/m;

    # ── Upstreams ────────────────────────────────────
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }
    upstream main_site {
        server main-site:3000;
        keepalive 16;
    }
    upstream admin_frontend {
        server admin-frontend:4322;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect (uncomment when SSL is configured) ──
    # server {
    #     listen 80;
    #     server_name yourdomain.com;
    #     return 301 https://$host$request_uri;
    # }

    # ── Main server block ────────────────────────────
    server {
        listen 80;
        server_name _;

        # Uncomment for SSL (after placing certs or using Certbot):
        # listen 443 ssl http2;
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache   shared:SSL:10m;
        # ssl_session_timeout 10m;

        # ── Security headers ─────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── API routes ───────────────────────────────
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # Stricter rate limit for auth endpoints
        location /api/auth/login {
            limit_req zone=api_auth burst=3 nodelay;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Health check (no rate limit)
        location /health {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        # Prometheus metrics (restrict in production)
        location /metrics {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            # Restrict to internal networks:
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # deny all;
        }

        # ── Admin dashboard ──────────────────────────
        location /admin/ {
            proxy_pass http://admin_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Cache static assets (JS/CSS/images)
            location ~* ^/admin/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf)$ {
                proxy_pass http://admin_frontend;
                proxy_set_header Host $host;
                proxy_cache_valid 200 7d;
                add_header Cache-Control "public, max-age=604800, immutable";
                add_header X-Cache-Status "static";
            }
        }

        # ── Main site (catch-all) ────────────────────
        location / {
            proxy_pass http://main_site;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Cache static assets (JS/CSS/images/fonts)
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf)$ {
                proxy_pass http://main_site;
                proxy_set_header Host $host;
                proxy_cache_valid 200 7d;
                add_header Cache-Control "public, max-age=604800, immutable";
                add_header X-Cache-Status "static";
            }
        }

        # ── Deny sensitive paths ─────────────────────
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
