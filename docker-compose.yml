version: '3.9'
services:
  api:
    build:
      context: ./admin-backend
    ports: ["8000:8000"]
    env_file: ./admin-backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  main-site:
    build:
      context: .
      dockerfile: Dockerfile.main
    ports: ["3000:3000"]
    environment:
      API_URL: http://api:8000
      CACHE_BUST_SECRET: ${CACHE_BUST_SECRET:-codepro-cache-bust-secret-change-me}
    depends_on: [api]
    restart: unless-stopped

  admin-frontend:
    build:
      context: ./admin-frontend
    ports: ["4322:4322"]
    environment:
      PUBLIC_API_URL: http://localhost:8000
      MAIN_SITE_URL: http://main-site:3000
      CACHE_BUST_SECRET: ${CACHE_BUST_SECRET:-codepro-cache-bust-secret-change-me}
    depends_on: [api]
    restart: unless-stopped
