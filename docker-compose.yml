version: '3.9'
services:
  # ── Redis (rate limiting + caching) ────────────────
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis-data:/data

  # ── API backend ────────────────────────────────────
  api:
    build:
      context: ./admin-backend
    ports: ["8000:8000"]
    env_file: ./admin-backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Main public site ──────────────────────────────
  main-site:
    build:
      context: .
      dockerfile: Dockerfile.main
    ports: ["3000:3000"]
    environment:
      API_URL: http://api:8000
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      CACHE_BUST_SECRET: ${CACHE_BUST_SECRET}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Admin dashboard ───────────────────────────────
  admin-frontend:
    build:
      context: ./admin-frontend
    ports: ["4322:4322"]
    environment:
      PUBLIC_API_URL: http://api:8000
      MAIN_SITE_URL: http://main-site:3000
      CACHE_BUST_SECRET: ${CACHE_BUST_SECRET}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4322/admin/login"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Nginx reverse proxy ───────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment for SSL:
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      main-site:
        condition: service_healthy
      admin-frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis-data:
