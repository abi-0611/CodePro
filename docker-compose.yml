version: '3.9'
services:
  api:
    build:
      context: ./admin-backend
    ports: ["8000:8000"]
    env_file: ./admin-backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  main-site:
    build:
      context: .
      dockerfile: Dockerfile.main
    ports: ["3000:3000"]
    environment:
      API_URL: http://api:8000
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      CACHE_BUST_SECRET: ${CACHE_BUST_SECRET}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  admin-frontend:
    build:
      context: ./admin-frontend
    ports: ["4322:4322"]
    environment:
      PUBLIC_API_URL: http://api:8000
      MAIN_SITE_URL: http://main-site:3000
      CACHE_BUST_SECRET: ${CACHE_BUST_SECRET}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4322/admin/login"]
      interval: 30s
      timeout: 5s
      retries: 3
